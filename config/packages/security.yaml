security:
    password_hashers:
        App\Entity\Utilisateur: 'auto'

    role_hierarchy:
        ROLE_ADMIN: ROLE_EMPLOYE
        ROLE_EMPLOYE: ROLE_USER

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            json_login:
                check_path: /api/login
                username_path: username
                password_path: password

            custom_authenticators:
                - App\Security\ApiTokenAuthenticator

    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/registration, roles: PUBLIC_ACCESS }
        - { path: ^/api/account/me, roles: ROLE_USER }
        - { path: ^/api/account/edit, roles: ROLE_USER }
        - { path: ^/api/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/reset-password, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            App\Entity\Utilisateur:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10