nelmio_cors:
    defaults:
        allow_credentials: false
        allow_origin: ['http://127.0.0.1:3001', 'http://localhost:3001']
        allow_headers: ['Content-Type', 'Authorization', 'X-AUTH-TOKEN']
        allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
        expose_headers: []
        max_age: 3600
    paths:
        '^/':
            allow_origin: ['http://127.0.0.1:3001', 'http://localhost:3001', 'https://ecf-front-end.vercel.app']
            allow_headers: ['Content-Type', 'Authorization', 'X-AUTH-TOKEN']
            allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
            max_age: 3600